<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>نموذج استشارة</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assests/css/style.css">
</head>
<body>

<header class="custom-header">
  <h1>نموذج طلب استشارة</h1>
</header>

<main class="container my-4">
  <section class="row justify-content-center">
    <div class="col-md-6">
      <form id="consultForm" class="card p-3">
        <div class="mb-3">
          <label for="name" class="form-label">الاسم</label>
          <input type="text" id="name" class="form-control" placeholder="اكتبي اسمك">
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">البريد الإلكتروني</label>
          <input type="email" id="email" class="form-control" placeholder="example@mail.com">
        </div>
        <div class="mb-3">
          <label for="message" class="form-label">الرسالة</label>
          <textarea id="message" class="form-control" rows="4" placeholder="اكتبي تفاصيل الاستشارة"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">إرسال</button>
      </form>
    </div>
  </section>
</main>

<footer>
  <p>© 2026 نموذج استشارة</p>
</footer>


<script src="assests/js/form.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

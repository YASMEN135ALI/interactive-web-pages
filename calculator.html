<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>حاسبة بسيطة</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assests/css/style.css">
</head>
<body>

<header class="custom-header">
  <h1>حاسبة بسيطة</h1>
</header>

<main class="container my-4">
  <section class="row justify-content-center">
    <div class="col-md-4">
      <div class="card">
        <div class="card-body">
          <input type="text" id="calcDisplay" class="form-control mb-3 text-end" readonly>
          <div class="row g-2">
            <div class="col-3"><button class="btn btn-light w-100 calc-btn">7</button></div>
            <div class="col-3"><button class="btn btn-light w-100 calc-btn">8</button></div>
            <div class="col-3"><button class="btn btn-light w-100 calc-btn">9</button></div>
            <div class="col-3"><button class="btn btn-warning w-100 calc-btn">/</button></div>

            <div class="col-3"><button class="btn btn-light w-100 calc-btn">4</button></div>
            <div class="col-3"><button class="btn btn-light w-100 calc-btn">5</button></div>
            <div class="col-3"><button class="btn btn-light w-100 calc-btn">6</button></div>
            <div class="col-3"><button class="btn btn-warning w-100 calc-btn">*</button></div>

            <div class="col-3"><button class="btn btn-light w-100 calc-btn">1</button></div>
            <div class="col-3"><button class="btn btn-light w-100 calc-btn">2</button></div>
            <div class="col-3"><button class="btn btn-light w-100 calc-btn">3</button></div>
            <div class="col-3"><button class="btn btn-warning w-100 calc-btn">-</button></div>

            <div class="col-3"><button class="btn btn-light w-100 calc-btn">0</button></div>
            <div class="col-3"><button class="btn btn-light w-100 calc-btn">.</button></div>
            <div class="col-3"><button class="btn btn-danger w-100" id="clearBtn">C</button></div>
            <div class="col-3"><button class="btn btn-warning w-100 calc-btn">+</button></div>

            <div class="col-12 mt-2">
              <button class="btn btn-success w-100" id="equalsBtn">=</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
</main>

<footer>
  <p>© 2026 حاسبة بسيطة</p>
</footer>


<script src="assests/js/calculator.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

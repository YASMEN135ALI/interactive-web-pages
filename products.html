<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>متجر منتجات وهمي</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assests/css/style.css">
</head>
<body>

<header class="custom-header">
  <h1>متجر بسيط</h1>
  <p>منتجات تدريبية وهمية</p>
  <span class="badge bg-light text-dark">العناصر في السلة: <span id="cartCount">0</span></span>
</header>

<main class="container my-4">
  <section class="row g-3">
    <div class="col-md-4">
      <div class="card h-100">
        <img src="https://via.placeholder.com/300x200" class="card-img-top" alt="منتج 1">
        <div class="card-body">
          <h5 class="card-title">دورة HTML</h5>
          <p class="card-text">السعر: 10$</p>
          <button class="btn btn-success add-to-cart">أضف إلى السلة</button>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card h-100">
        <img src="https://via.placeholder.com/300x200" class="card-img-top" alt="منتج 2">
        <div class="card-body">
          <h5 class="card-title">دورة CSS</h5>
          <p class="card-text">السعر: 12$</p>
          <button class="btn btn-success add-to-cart">أضف إلى السلة</button>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card h-100">
        <img src="https://via.placeholder.com/300x200" class="card-img-top" alt="منتج 3">
        <div class="card-body">
          <h5 class="card-title">دورة JavaScript</h5>
          <p class="card-text">السعر: 15$</p>
          <button class="btn btn-success add-to-cart">أضف إلى السلة</button>
        </div>
      </div>
    </div>
  </section>
</main>

<footer>
  <p>© 2026 متجر وهمي</p>
</footer>

<script src="assests/js/products.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
